<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="mandiGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0CBAB"/>
      <stop offset="50%" stop-color="#DCAA61"/>
      <stop offset="100%" stop-color="#A97631"/>
    </linearGradient>
  </defs>
  <!-- Black background -->
  <rect width="64" height="64" rx="14" fill="#060503"/>
  <!-- Gold ring border -->
  <rect x="3" y="3" width="58" height="58" rx="11" fill="none" stroke="url(#mandiGold)" stroke-width="1.2" opacity="0.55"/>
  <!-- MD monogram -->
  <g font-family="Georgia, 'Times New Roman', serif" font-weight="700" text-anchor="middle">
    <text x="32" y="42" font-size="30" fill="url(#mandiGold)" letter-spacing="-1.5">MD</text>
  </g>
</svg>
